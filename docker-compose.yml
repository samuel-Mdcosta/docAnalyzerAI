services:
  backend:
    build: ./backend
    container_name: docanalyzer-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: docanalyzer-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
